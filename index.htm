<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #c5a059;
            /* Gold */
            --secondary: #004d40;
            /* Deep Teal/Green */
            --accent: #ff4d4d;
            /* For discount */
            --text-light: #f8f9fa;
            --glass: rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            background-color: #000;
            overflow-x: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Background Slider */
        .background-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .bg-image.active {
            opacity: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.8) 100%);
        }

        /* Glass Container */
        .container {
            width: 90%;
            max-width: 800px;
            padding: 3rem 2rem;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-family: 'Cairo', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        /* Timer */
        .timer-container {
            margin: 2rem 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 12px;
            min-width: 80px;
        }

        .timer-value {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }

        .timer-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .limited-offer {
            display: inline-block;
            background: var(--accent);
            padding: 0.25rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Pricing */
        .pricing {
            margin: 2.5rem 0;
        }

        .old-price {
            font-size: 1.5rem;
            text-decoration: line-through;
            opacity: 0.6;
            margin-right: 1rem;
        }

        .new-price {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
        }

        .currency {
            font-size: 1.5rem;
            vertical-align: super;
            margin-left: 5px;
        }

        /* Buttons */
        .cta-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            gap: 10px;
            font-size: 1.1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            background: #e0b86a;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3);
        }

        .btn-whatsapp {
            background: #25d366;
            color: #fff;
        }

        .btn-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        /* Contact Info */
        .contact-info {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .email-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .email-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }

            .new-price {
                font-size: 2.5rem;
            }

            .timer-container {
                gap: 0.5rem;
            }

            .timer-box {
                min-width: 60px;
                padding: 0.5rem;
            }

            .timer-value {
                font-size: 1.5rem;
            }
        }
    </style>

<body>

    <div class="background-slider">
        <div class="bg-image active" style="background-image: url('images/cityscape-dubai-fog-sunrise.jpg')"></div>
        <div class="bg-image" style="background-image: url('images/mall-dome-architecture-dubai.jpg')"></div>
        <div class="bg-image" style="background-image: url('images/desert-dubai-friends-arab.jpg')"></div>
        <div class="bg-image"
            style="background-image: url('images/burj-al-arab-largest-hotel-in-dubai-tallest-hotel-dubai.jpg')"></div>
        <div class="bg-image" style="background-image: url('images/animal-camel-nature-mammal.jpg')"></div>
        <div class="overlay"></div>
    </div>

    <div class="container">
        <h1>araby.org</h1>
        <p class="tagline">The ultimate domain for Arabic business & culture</p>

        <div class="limited-offer">LIMITED TIME OFFER</div>

        <div class="pricing">
            <span class="old-price">$4,500</span>
            <span class="new-price">$4,500<span class="currency">USD</span></span>
        </div>

        <div class="timer-container" id="countdown">
            <div class="timer-box">
                <span class="timer-value" id="days">00</span>
                <span class="timer-label">Days</span>
            </div>
            <div class="timer-box">
                <span class="timer-value" id="hours">00</span>
                <span class="timer-label">Hrs</span>
            </div>
            <div class="timer-box">
                <span class="timer-value" id="minutes">00</span>
                <span class="timer-label">Min</span>
            </div>
            <div class="timer-box">
                <span class="timer-value" id="seconds">00</span>
                <span class="timer-label">Sec</span>
            </div>
        </div>

        <div class="cta-group">
            <a href="https://www.paypal.com/ncp/payment/46F9MQEV72BZ4" class="btn btn-primary">
                <i class="fa-brands fa-paypal"></i> Buy Now via PayPal
            </a>
            <a href="https://wa.me/201555244794" class="btn btn-whatsapp" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> Contact via WhatsApp
            </a>
        </div>

        <div class="contact-info">
            <p>Direct Inquiries: <a href="mailto:admin@araby.org" class="email-link">admin@araby.org</a></p>
        </div>
    </div>

    <script>
        // Countdown Timer
        const targetDate = new Date('June 1, 2026 00:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference > 0) {
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = days.toString().padStart(2, '0');
                document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Background Slider
        const images = document.querySelectorAll('.bg-image');
        let currentIdx = 0;

        function nextImage() {
            images[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % images.length;
            images[currentIdx].classList.add('active');
        }

        setInterval(nextImage, 6000); // Change image every 6 seconds
    </script>
</body>

</html>
